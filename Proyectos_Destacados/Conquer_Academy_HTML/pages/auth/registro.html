    <meta charset="UTF-8" />

    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1><a href="../../index.html">Conquer Academy</a></h1>
      <nav>
        <ul>
          <li><a href="../../index.html">Home</a></li>
          <li><a href="../quienes-somos.html">Quiénes Somos</a></li>
          <li><a href="../courses/cursos.html">Cursos</a></li>

          <li><a href="../auth/registro.html">Registro</a></li>
          <li><a href="../contacto.html">Contacto</a></li>
          <li><a href="../auth/login.html">Login</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <h2>Registro</h2>
      <img
        width="80%"
        src="../../assets/images/banner.webp"
        alt="Imagen de Conquer Academy"
      />
      <form action="#" method="post" enctype="multipart/form-data">
        <div>
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" name="nombre" required />
        </div>
        <div>
          <label for="fecha_nacimiento">Fecha de Nacimiento</label>
          <input
            type="date"
            id="fecha_nacimiento"
            name="fecha_nacimiento"
            required
          />
        </div>
        <div>
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required />
        </div>
        <div>
          <label for="direccion">Dirección</label>
          <input type="text" id="direccion" name="direccion" required />
        </div>
        <div>
          <label for="pagina_web">Página Web</label>
          <input type="url" id="pagina_web" name="pagina_web" />
        </div>
        <div>
          <label for="foto">Foto de Perfil</label>
          <input type="file" id="foto" name="foto" accept="image/*" />
        </div>
        <div>
          <label for="biografia">Biografía</label>
          <textarea id="biografia" name="biografia"></textarea>
        </div>
        <button type="submit">Registrarse</button>
      </form>
    </main>
    <footer>

      <a href="../legal/politica-privacidad.html">Política de Privacidad</a>
      | <a href="../legal/terminos-uso.html">Términos de Uso</a>
    </footer>
  </body>
</html>
