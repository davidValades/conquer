<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Inicia sesión en Conquer Blocks Academy para acceder a tus cursos y contenidos." />
  <title>Login – Conquer Blocks Academy</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="site-header">
    <div class="container">
      <a href="index.html" class="logo">
        <img src="img/logo-conquer.png" alt="Conquer Blocks Academy" width="150" height="48" />
      </a>
      <nav class="main-nav" aria-label="Menú principal">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="quienes-somos.html">Quiénes somos</a></li>
          <li><a href="cursos.html">Cursos</a></li>
          <li><a href="blog.html">Blog</a></li>
          <li><a href="registro.html">Registro</a></li>
          <li><a href="login.html" aria-current="page">Login</a></li>
          <li><a href="contacto.html">Contacto</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- ===== MAIN ===== -->
  <main>
    <section class="section">
      <div class="form-wrapper" style="max-width: 440px;">
        <h1>Iniciar sesión</h1>
        <p style="margin-bottom: 1.5rem; color: #6c757d;">
          ¿No tienes cuenta? <a href="registro.html">Regístrate gratis</a>.
        </p>

        <form action="#" method="post" novalidate>

          <div class="form-group">
            <label for="email">Correo electrónico</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="tu@email.com"
              required
              autocomplete="email"
            />
          </div>

          <div class="form-group">
            <label for="password">Contraseña</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Tu contraseña"
              required
              autocomplete="current-password"
            />
          </div>

          <div class="form-group" style="flex-direction: row; align-items: center; gap: 0.5rem;">
            <input type="checkbox" id="recordarme" name="recordarme" />
            <label for="recordarme" style="font-weight: normal;">Recordarme</label>
          </div>

          <button type="submit" class="btn" style="width: 100%; margin-top: 0.5rem;">
            Iniciar sesión
          </button>

        </form>

        <p style="margin-top: 1.25rem; text-align: center; font-size: 0.9rem;">
          <a href="#">¿Olvidaste tu contraseña?</a>
        </p>
      </div>
    </section>
  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2024 Conquer Blocks Academy. Todos los derechos reservados.</p>
      <p><a href="aviso-legal.html">Aviso Legal</a></p>
    </div>
  </footer>

</body>
</html>
